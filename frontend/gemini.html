<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ativar Gemini</title>
    <link id="app-css" rel="stylesheet" href="">
  </head>
  <body class="gemini-gate-body">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/index.html">DocExtract</a>
        <nav class="topbar-nav" aria-label="Navegação principal">
          <a href="/cadastros.html">Cadastros</a>
          <a href="/rag.html">Consulta RAG</a>
          <a href="/index.html">Extração</a>
          <a class="topbar-action" href="/gemini.html">Trocar chave</a>
        </nav>
      </div>
    </header>

    <main class="page-shell gate-shell">
      <section class="gate-panel" aria-labelledby="gate-title">
        <p class="gate-eyebrow">Acesso Gemini</p>
        <h1 id="gate-title">Informe a chave da API</h1>
        <p class="gate-copy">A aplicação usa Gemini na extração e no RAG. Sem uma chave válida, o sistema volta para esta tela.</p>
        <div class="gate-message success" role="status" hidden data-gate-success></div>
        <div class="gate-message error" role="alert" hidden data-gate-error></div>
        <form class="gate-form" method="post" autocomplete="off" data-gate-form>
          <input type="hidden" name="next" value="/index.html">
          <label for="api_key">Chave do Gemini</label>
          <input id="api_key" name="api_key" type="password" inputmode="text" autocomplete="off" placeholder="Digite a chave aqui" required>
          <div class="gate-actions"><button class="action-button" type="submit">Ativar acesso</button></div>
        </form>
      </section>
    </main>

    <script type="module" src="/src/gemini.js"></script>
  </body>
</html>
