{% load static %}
<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Extração de Dados de Nota Fiscal</title>
    <link rel="stylesheet" href="{% static 'invoices/styles.css' %}">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/">DocExtract</a>
        <label class="topbar-upload" for="pdf-input">Enviar Arquivo</label>
      </div>
    </header>

    <main class="page-shell">
      <section class="hero" aria-labelledby="page-title">
        <h1 id="page-title">Extração de Dados de Nota Fiscal</h1>
        <p>
          Faça upload do documento PDF da nota fiscal.<br>
          Extraia os dados estruturados com alta precisão.
        </p>
      </section>

      <section class="upload-section" aria-labelledby="upload-title">
        <form id="upload-form" class="upload-form">
          {% csrf_token %}
          <label id="dropzone" class="dropzone" for="pdf-input">
            <span class="upload-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z"></path>
                <path d="M14 2v5h5"></path>
                <path d="M12 17V9"></path>
                <path d="m8 13 4-4 4 4"></path>
              </svg>
            </span>
            <span id="upload-title" class="dropzone-title">Carregue sua nota fiscal</span>
            <span class="dropzone-text">Arraste e solte o arquivo PDF aqui ou clique para procurar.</span>
            <span id="selected-file" class="selected-file" hidden>
              <span id="selected-file-name"></span>
              <strong id="selected-file-size"></strong>
            </span>
            <input id="pdf-input" name="pdf" type="file" accept="application/pdf" hidden>
          </label>

          <button id="extract-button" class="extract-button" type="submit" disabled>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 3v12"></path>
              <path d="m8 11 4 4 4-4"></path>
              <path d="M5 19h14"></path>
            </svg>
            <span>Extrair Dados</span>
          </button>
        </form>
      </section>

      <section id="result-panel" class="results" hidden aria-labelledby="result-title">
        <div class="results-heading">
          <h2 id="result-title">Dados Extraídos</h2>
          <p id="provider-badge" class="provider-badge" hidden></p>
        </div>

        <div class="result-actions">
          <button id="analyze-button" class="action-button" type="button" disabled>Analisar Dados</button>
        </div>

        <section id="analysis-section" class="analysis-section" hidden aria-labelledby="analysis-title">
          <h2 id="analysis-title">Resultado da Análise</h2>
          <p id="analysis-summary" class="analysis-summary" hidden></p>
          <div id="analysis-grid" class="analysis-grid"></div>
        </section>

        <section id="launch-section" class="launch-section" hidden aria-labelledby="launch-title">
          <h2 id="launch-title">Resultado do Lançamento</h2>
          <p id="launch-message" class="launch-message"></p>
          <div id="launch-grid" class="launch-grid"></div>
        </section>

        <div class="tabs" role="tablist" aria-label="Visualização dos dados extraídos">
          <button id="tab-formatted" class="tab active" type="button" role="tab" aria-controls="formatted-view" aria-selected="true" data-tab="formatted">
            Visualização Formatada
          </button>
          <button id="tab-json" class="tab" type="button" role="tab" aria-controls="json-view" aria-selected="false" data-tab="json">
            JSON Bruto
          </button>
        </div>

        <div id="formatted-view" class="formatted-view" role="tabpanel" aria-labelledby="tab-formatted"></div>

        <div id="json-view" class="json-view" role="tabpanel" aria-labelledby="tab-json" hidden>
          <div class="json-header">
            <h3>JSON Bruto</h3>
            <button id="copy-button" class="copy-button" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              Copiar JSON
            </button>
          </div>
          <pre class="json-block"><code id="json-output"></code></pre>
        </div>
      </section>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </main>

    <script src="{% static 'invoices/app.js' %}"></script>
  </body>
</html>
